version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - decorder
    - errcheck
    - exhaustive
    - goconst
    - gocritic
    - gosec
    - govet
    - grouper
    - iface
    - misspell
    - nestif
    - perfsprint
    - predeclared
    - staticcheck
    - testifylint
    - unused
    - wsl_v5
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
  settings:
    exhaustive:
      default-signifies-exhaustive: true

formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - prefix(github.com/RyanRedburn/flight-tracker/)
        - default
      custom-order: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
